<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Seal Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Tesseract.js for OCR Scanning -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .input-group {
            position: relative;
        }
        .input-field {
            width: 100%;
            padding: 0.75rem;
            padding-right: 3rem; /* Space for the scan button */
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .scan-btn {
            position: absolute;
            right: 0.75rem;
            bottom: 0.75rem;
            color: #6b7280;
            transition: color 0.2s;
        }
        .scan-btn:hover { color: #2563eb; }
        
        .uppercase-input { text-transform: uppercase; }
        
        .btn-primary {
            background-color: #2563eb;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        
        .table-container { max-height: 500px; overflow-y: auto; }

        /* Scanner Modal Styles */
        #scannerOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #scannerOverlay.active { display: flex; }
        #videoFeed {
            width: 100%;
            max-width: 500px;
            height: auto;
            border: 2px solid white;
        }
        .scan-guide {
            position: absolute;
            width: 80%;
            height: 100px;
            border: 2px dashed #10b981;
            pointer-events: none;
            z-index: 110;
        }
        
        #shareModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(4px);
        }
        #shareModal.active { display: flex; }

        .spinner {
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">Seal Record System</h1>
            <p id="connectionStatus" class="text-sm text-gray-500 italic mt-1">Connecting to secure storage...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Container No Input -->
            <div class="card p-6">
                <label class="block font-semibold text-gray-700">Container No.</label>
                <div class="input-group">
                    <input type="text" id="containerNo" class="input-field uppercase-input" placeholder="e.g. MSCU1234567">
                    <button onclick="startScanner('containerNo')" class="scan-btn" title="Scan with camera">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
                <button onclick="clearField('containerNo')" class="mt-2 text-xs text-blue-600 hover:underline">Clear</button>
            </div>

            <!-- Old Seal Input -->
            <div class="card p-6">
                <label class="block font-semibold text-gray-700">Old Seal</label>
                <div class="input-group">
                    <input type="text" id="oldSeal" class="input-field uppercase-input" placeholder="Old Seal ID">
                    <button onclick="startScanner('oldSeal')" class="scan-btn" title="Scan with camera">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
                <button onclick="clearField('oldSeal')" class="mt-2 text-xs text-blue-600 hover:underline">Clear</button>
            </div>

            <!-- New Seal Input -->
            <div class="card p-6">
                <label class="block font-semibold text-gray-700">New Seal</label>
                <div class="input-group">
                    <input type="text" id="newSeal" class="input-field uppercase-input" placeholder="New Seal ID">
                    <button onclick="startScanner('newSeal')" class="scan-btn" title="Scan with camera">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
                <button onclick="clearField('newSeal')" class="mt-2 text-xs text-blue-600 hover:underline">Clear</button>
            </div>
        </div>

        <!-- Action Section -->
        <div class="card p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Date</label>
                    <input type="date" id="recordDate" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Shift</label>
                    <select id="shift" class="input-field">
                        <option value="1">Shift 1</option>
                        <option value="2">Shift 2</option>
                        <option value="3">Shift 3</option>
                        <option value="4">Shift 4</option>
                    </select>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 justify-center md:justify-end mt-4">
                <button onclick="addEntry()" id="addBtn" class="btn-primary px-8 flex items-center gap-2">Save Record</button>
                <button onclick="exportToExcel()" id="exportBtn" class="bg-emerald-500 text-white px-6 py-3 rounded-lg font-bold opacity-50 cursor-not-allowed" disabled>Excel</button>
                <button onclick="openShareModal()" id="shareBtn" class="bg-sky-500 text-white px-6 py-3 rounded-lg font-bold opacity-50 cursor-not-allowed" disabled>Share</button>
            </div>
        </div>

        <div id="statusMsg" class="hidden mb-4 p-3 rounded-lg text-center font-medium shadow-sm"></div>

        <div class="card p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-700">Recent Records</h2>
                <span id="recordCount" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">0 Records</span>
            </div>
            <div class="table-container">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr>
                            <th class="p-3 border-b text-xs font-bold text-gray-600">DATE/SHIFT</th>
                            <th class="p-3 border-b text-xs font-bold text-gray-600">CONTAINER</th>
                            <th class="p-3 border-b text-xs font-bold text-gray-600">OLD SEAL</th>
                            <th class="p-3 border-b text-xs font-bold text-gray-600">NEW SEAL</th>
                        </tr>
                    </thead>
                    <tbody id="entriesTableBody" class="text-sm"></tbody>
                </table>
            </div>
            <div id="emptyState" class="text-center py-8 text-gray-400">Loading records...</div>
        </div>
    </div>

    <!-- Fullscreen Scanner Overlay -->
    <div id="scannerOverlay">
        <video id="videoFeed" autoplay playsinline></video>
        <div class="scan-guide"></div>
        <div class="absolute bottom-10 flex flex-col items-center gap-4 w-full">
            <p id="scannerStatus" class="text-white text-sm bg-black/50 px-4 py-2 rounded">Align text within the box</p>
            <div class="flex gap-4">
                <button onclick="captureImage()" id="captureBtn" class="bg-white text-black px-8 py-3 rounded-full font-bold">CAPTURE</button>
                <button onclick="stopScanner()" class="bg-red-500 text-white px-8 py-3 rounded-full font-bold">CANCEL</button>
            </div>
        </div>
        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <!-- Share Modal -->
    <div id="shareModal">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-2 text-gray-800">Share Records</h3>
            <div class="space-y-3 mt-4">
                <button onclick="shareData('whatsapp')" class="w-full py-3 bg-[#25D366] text-white rounded-lg font-bold">WhatsApp</button>
                <button onclick="shareData('email')" class="w-full py-3 bg-gray-800 text-white rounded-lg font-bold">Email</button>
                <button onclick="closeShareModal()" class="w-full py-3 bg-gray-100 text-gray-600 rounded-lg font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, user, entries = [];
        let activeTargetId = null;
        let stream = null;

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'seal-record-app';

        // 1. Scanner Logic
        window.startScanner = async (targetId) => {
            activeTargetId = targetId;
            const overlay = document.getElementById('scannerOverlay');
            const video = document.getElementById('videoFeed');

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', focusMode: 'continuous' } 
                });
                video.srcObject = stream;
                overlay.classList.add('active');
            } catch (err) {
                console.error(err);
                alert("Could not access camera. Please check permissions.");
            }
        };

        window.stopScanner = () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('scannerOverlay').classList.remove('active');
            activeTargetId = null;
        };

        window.captureImage = async () => {
            const video = document.getElementById('videoFeed');
            const canvas = document.getElementById('captureCanvas');
            const ctx = canvas.getContext('2d');
            const status = document.getElementById('scannerStatus');
            const captureBtn = document.getElementById('captureBtn');

            // Capture the current frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // OCR Processing
            captureBtn.disabled = true;
            status.innerText = "Processing text... Please wait.";
            
            try {
                const result = await Tesseract.recognize(canvas, 'eng', {
                    logger: m => console.log(m)
                });
                
                // Clean the text: uppercase, remove newlines, remove special characters
                let text = result.data.text.toUpperCase().replace(/[^A-Z0-9]/g, '');
                
                if (text.length > 0) {
                    document.getElementById(activeTargetId).value = text;
                    showStatus(`Successfully scanned: ${text}`, 'success');
                    stopScanner();
                } else {
                    status.innerText = "Could not read text. Try again.";
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Error scanning. Try again.";
            } finally {
                captureBtn.disabled = false;
            }
        };

        // 2. Auth & Firestore Logic
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('connectionStatus').innerText = "Storage Active";
                document.getElementById('connectionStatus').className = "text-sm text-green-600 font-bold mt-1";
                subscribeToRecords();
            }
        });

        const subscribeToRecords = () => {
            const recordsCol = collection(db, 'artifacts', appId, 'public', 'data', 'sealRecords');
            onSnapshot(recordsCol, (snap) => {
                entries = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                entries.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                updateUI();
            });
        };

        window.addEntry = async () => {
            if (!user) return;
            const container = document.getElementById('containerNo').value.trim().toUpperCase();
            const oldS = document.getElementById('oldSeal').value.trim().toUpperCase();
            const newS = document.getElementById('newSeal').value.trim().toUpperCase();
            const date = document.getElementById('recordDate').value;
            const shift = document.getElementById('shift').value;

            if (!container || !oldS || !newS) {
                showStatus('Missing fields.', 'error');
                return;
            }

            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.innerText = "Saving...";

            try {
                const col = collection(db, 'artifacts', appId, 'public', 'data', 'sealRecords');
                await addDoc(col, { Date: date, Shift: shift, 'Container No': container, 'Old Seal': oldS, 'New Seal': newS, createdAt: serverTimestamp() });
                ['containerNo', 'oldSeal', 'newSeal'].forEach(id => document.getElementById(id).value = '');
                showStatus('Saved to cloud.', 'success');
            } finally {
                btn.disabled = false;
                btn.innerText = "Save Record";
            }
        };

        function updateUI() {
            const tbody = document.getElementById('entriesTableBody');
            const empty = document.getElementById('emptyState');
            tbody.innerHTML = '';
            document.getElementById('recordCount').innerText = `${entries.length} Records`;
            
            if (entries.length === 0) {
                empty.classList.remove('hidden');
                document.getElementById('exportBtn').disabled = true;
                document.getElementById('shareBtn').disabled = true;
            } else {
                empty.classList.add('hidden');
                document.getElementById('exportBtn').disabled = false;
                document.getElementById('shareBtn').disabled = false;
                document.getElementById('exportBtn').classList.remove('opacity-50', 'cursor-not-allowed');
                document.getElementById('shareBtn').classList.remove('opacity-50', 'cursor-not-allowed');
                
                entries.forEach(e => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-gray-50";
                    tr.innerHTML = `
                        <td class="p-3 text-gray-500">${e.Date}<br>Shift ${e.Shift}</td>
                        <td class="p-3 font-bold text-gray-800">${e['Container No']}</td>
                        <td class="p-3 text-gray-700 font-mono">${e['Old Seal']}</td>
                        <td class="p-3 text-gray-700 font-mono">${e['New Seal']}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        window.exportToExcel = () => {
            const data = entries.map(({id, createdAt, ...rest}) => rest);
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `Seal_Records_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        window.openShareModal = () => document.getElementById('shareModal').classList.add('active');
        window.closeShareModal = () => document.getElementById('shareModal').classList.remove('active');
        window.shareData = (type) => {
            let text = "📦 SEAL RECORDS\n";
            entries.slice(0, 5).forEach(e => text += `- ${e['Container No']}: ${e['Old Seal']} -> ${e['New Seal']}\n`);
            const encoded = encodeURIComponent(text);
            if (type === 'whatsapp') window.open(`https://wa.me/?text=${encoded}`, '_blank');
            else window.open(`mailto:?subject=Seal Records&body=${encoded}`, '_self');
            closeShareModal();
        };

        window.showStatus = (m, t) => {
            const el = document.getElementById('statusMsg');
            el.innerText = m;
            el.className = `mb-4 p-3 rounded-lg text-center text-sm font-bold ${t === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        };

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('recordDate').value = today;
        initAuth();
    </script>
</body>
</html>
